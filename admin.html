<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — The Log</title>
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 8vw 80px;
  }

  /* ---- password gate ---- */
  .gate {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .gate-title {
    font-family: var(--font-head);
    font-size: clamp(28px, 4vw, 44px);
    margin-bottom: 8px;
  }

  /* ---- admin panel ---- */
  .panel {
    width: 100%;
    max-width: 620px;
    display: none;
    flex-direction: column;
    gap: 32px;
  }
  .panel.visible { display: flex; }

  .panel-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
  }
  .panel-title {
    font-family: var(--font-head);
    font-size: clamp(28px, 4vw, 44px);
  }
  .panel-logout {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    transition: color .2s;
  }
  .panel-logout:hover { color: var(--accent); }

  /* ---- form fields ---- */
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field input,
  .field select,
  .field textarea {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--ink);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: var(--paper); color: var(--ink); }

  /* ---- type selector ---- */
  .type-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .type-btn {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid var(--line);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .type-btn:hover { border-color: var(--ink); color: var(--ink); }
  .type-btn.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .type-btn[data-type="DSA"].selected    { background: #5b8dd9; border-color: #5b8dd9; color: #fff; }
  .type-btn[data-type="BUILD"].selected  { background: var(--accent); border-color: var(--accent); color: #fff; }
  .type-btn[data-type="VIDEO"].selected  { background: #e8a020; border-color: #e8a020; color: #fff; }
  .type-btn[data-type="MUSIC"].selected  { background: #8b6bbf; border-color: #8b6bbf; color: #fff; }
  .type-btn[data-type="LIFE"].selected   { background: #5aaa72; border-color: #5aaa72; color: #fff; }

  /* ---- submit button ---- */
  .submit-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    padding: 16px 32px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    transition: background .2s, transform .15s;
    align-self: flex-start;
  }
  .submit-btn:hover { background: var(--accent); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ---- status message ---- */
  .status-msg {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    padding: 12px 16px;
    display: none;
  }
  .status-msg.success {
    display: block;
    border: 1px solid #5aaa72;
    color: #5aaa72;
  }
  .status-msg.error {
    display: block;
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  /* ---- recent entries preview ---- */
  .recent-title {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .recent-entry {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .recent-type {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: .14em;
    color: var(--muted);
    flex-shrink: 0;
    width: 44px;
  }
  .recent-text {
    font-size: 13px;
    color: var(--ink-soft);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .recent-date {
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--muted);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="admin-wrap">

  <!-- PASSWORD GATE -->
  <div class="gate" id="gate">
    <div class="eyebrow">qvrtik — admin</div>
    <div class="gate-title">The Log <em>Admin</em></div>
    <p style="font-size:13px; color:var(--ink-soft); line-height:1.6; margin-bottom:8px;">
      Private panel — not linked anywhere on the site.
    </p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="enter password" autocomplete="current-password">
    </div>
    <button class="submit-btn" id="unlockBtn">Unlock</button>
    <div class="status-msg" id="gateMsg"></div>
  </div>

  <!-- ADMIN PANEL (hidden until unlocked) -->
  <div class="panel" id="panel">

    <div class="panel-header">
      <div class="panel-title">Post <em>Entry</em></div>
      <button class="panel-logout" id="logoutBtn">Lock panel</button>
    </div>

    <!-- ENTRY FORM -->
    <div class="field">
      <label>Type</label>
      <div class="type-grid">
        <button class="type-btn" data-type="DSA">DSA</button>
        <button class="type-btn" data-type="BUILD">Build</button>
        <button class="type-btn" data-type="VIDEO">Video</button>
        <button class="type-btn" data-type="MUSIC">Music</button>
        <button class="type-btn" data-type="LIFE">Life</button>
      </div>
      <input type="hidden" id="selectedType">
    </div>

    <div class="field">
      <label>Title / Caption</label>
      <textarea id="entryTitle" placeholder="Day 3/30 — solved Two Sum, Valid Parentheses..."></textarea>
    </div>

    <div class="field">
      <label>Link (optional)</label>
      <input type="url" id="entryLink" placeholder="https://linkedin.com/...">
    </div>

    <div class="field">
      <label>Platform (optional)</label>
      <select id="entryPlatform">
        <option value="">— none —</option>
        <option value="linkedin">LinkedIn</option>
        <option value="github">GitHub</option>
        <option value="youtube">YouTube</option>
        <option value="instagram">Instagram</option>
      </select>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="entryDate">
    </div>

    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
      <button class="submit-btn" id="submitBtn">Post Entry</button>
      <div class="status-msg" id="formMsg"></div>
    </div>

    <!-- RECENT ENTRIES PREVIEW -->
    <div>
      <div class="recent-title">Recent entries</div>
      <div id="recentList"></div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:3000/api/log';
const ADMIN_PASSWORD = 'qvrtik2026';

// ---- State ----
let selectedType = null;
let isSubmitting = false;

// ---- Password gate ----
function showMsg(el, text, type) {
  el.textContent = text;
  el.className = `status-msg ${type}`;
}

function unlock(password) {
  if (password !== ADMIN_PASSWORD) {
    showMsg(document.getElementById('gateMsg'), 'Incorrect password', 'error');
    return;
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('panel').classList.add('visible');
  // set today's date as default
  document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
  loadRecent();
}

document.getElementById('unlockBtn').addEventListener('click', () => {
  unlock(document.getElementById('passwordInput').value.trim());
});

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock(e.target.value.trim());
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('panel').classList.remove('visible');
  document.getElementById('passwordInput').value = '';
  selectedType = null;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
});

// ---- Type selector ----
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedType = btn.dataset.type;
  });
});

// ---- Submit entry ----
document.getElementById('submitBtn').addEventListener('click', async () => {
  const formMsg = document.getElementById('formMsg');
  const title = document.getElementById('entryTitle').value.trim();
  const link = document.getElementById('entryLink').value.trim();
  const platform = document.getElementById('entryPlatform').value;
  const date = document.getElementById('entryDate').value;

  // Client-side validation
  if (!selectedType) {
    showMsg(formMsg, 'Please select a type', 'error'); return;
  }
  if (!title) {
    showMsg(formMsg, 'Title is required', 'error'); return;
  }
  if (isSubmitting) return;

  isSubmitting = true;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Posting...';
  formMsg.className = 'status-msg';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': ADMIN_PASSWORD
      },
      body: JSON.stringify({
        type: selectedType,
        title,
        link: link || null,
        platform: platform || null,
        date
      })
    });

    const json = await res.json();

    if (!res.ok) {
      showMsg(formMsg, json.error || 'Server error', 'error');
      return;
    }

    showMsg(formMsg, `Entry posted — "${json.data.title.slice(0,40)}..."`, 'success');

    // Reset form
    document.getElementById('entryTitle').value = '';
    document.getElementById('entryLink').value = '';
    document.getElementById('entryPlatform').value = '';
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    selectedType = null;

    loadRecent();

  } catch (err) {
    showMsg(formMsg, 'Could not reach server — is it running?', 'error');
    console.error(err);
  } finally {
    isSubmitting = false;
    btn.disabled = false;
    btn.textContent = 'Post Entry';
  }
});

// ---- Load recent entries preview ----
async function loadRecent() {
  const list = document.getElementById('recentList');
  try {
    const res = await fetch(API);
    const json = await res.json();
    const recent = json.data.slice(0, 5);

    list.innerHTML = recent.map(e => `
      <div class="recent-entry">
        <span class="recent-type">${e.type}</span>
        <span class="recent-text">${e.title}</span>
        <span class="recent-date">${e.date}</span>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<div style="font-size:12px; color:var(--muted); padding:12px 0;">Could not load recent entries</div>';
  }
}
</script>

</body>
</html>
